<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoMail | Queries</title>
    <link rel="stylesheet" href="sidebar.css">
    <script src="sidebar.js"></script>
    <script>
      let currentUserEmail = sessionStorage.getItem('userEmail');
      async function checkAuthStatus() {
        if (currentUserEmail) return;
        try {
          const res = await fetch('/api/auth/user');
          const data = await res.json();
          if (!data.isAuthenticated) {
            window.location.href = 'login.html';
            return;
          }
          sessionStorage.setItem('userEmail', data.email?.toLowerCase());
        } catch (e) {
          window.location.href = 'login.html';
        }
      }
      checkAuthStatus();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; min-height: 100vh; overflow-x: hidden; transition: background-color 0.3s, color 0.3s; }

        /* Film Grain Overlay */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04; pointer-events: none; z-index: 9999;
        }

        /* Local Styles */.header h1 { font-size: 82px; font-weight: 900; color: var(--primary); letter-spacing: -4px; line-height: 0.9; text-transform: uppercase; }
        .header p { font-size: 16px; color: var(--text-sub); margin-top: 12px; max-width: 600px; }

        /* WIDGET / TABLE AREA */
        .widget {
            background: var(--surface);
            border: 1px dashed var(--border);
            padding: 40px;
            position: relative;
            border-radius: 4px;
        }
        .widget::before, .widget::after {
            content: "○"; position: absolute; font-size: 10px; color: var(--text-faint);
        }
        .widget::before { top: 10px; left: 10px; }
        .widget::after { top: 10px; right: 10px; }

        .search-bar {
            margin-bottom: 32px;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 100px;
            padding: 14px 24px;
            width: 100%;
            max-width: 400px;
            color: var(--text);
            outline: none;
            font-size: 14px;
        }
        .search-bar:focus { border-color: var(--primary); }

        .data-table { width: 100%; border-spacing: 0; border-collapse: separate; margin-top: 20px; }
        .data-table th, .data-table td { 
            padding: 20px 16px; 
            text-align: left; 
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        .data-table th { 
            font-weight: 900; color: var(--text); background: var(--table-header); 
            font-size: 10px; text-transform: uppercase; letter-spacing: 2px;
        }
        .data-table td { color: var(--text); font-size: 14px; font-weight: 600; line-height: 1.5; }
        .data-table td .topic { color: var(--primary); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 900; display: block; margin-bottom: 4px; }
        .data-table td .msg { color: #888; font-weight: 400; font-size: 13px; line-height: 1.5; display: block; max-width: 400px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .data-table tbody tr { cursor: pointer; transition: background-color 0.2s; }
        .data-table tbody tr:hover { background-color: rgba(255, 45, 45, 0.05); }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 20000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background-color: var(--surface);
            padding: 40px;
            border: 1px dashed var(--border);
            width: 90%;
            max-width: 600px;
            border-radius: 4px;
            position: relative;
        }
        .modal-content::before, .modal-content::after {
            content: '○';
            position: absolute;
            font-size: 10px;
            color: var(--text-faint);
        }
        .modal-content::before { top: 10px; left: 10px; }
        .modal-content::after { top: 10px; right: 10px; }
        .close {
            color: #666;
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 24px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .close:hover { color: #fff; }
        .modal-topic { font-size: 11px; font-weight: 900; color: var(--primary); letter-spacing: 2px; margin-bottom: 12px; text-transform: uppercase; }
        .modal-sender { font-size: 14px; color: var(--text-sub); margin-bottom: 30px; font-weight: 600; }
        .modal-text { font-size: 16px; color: var(--text); line-height: 1.6; white-space: pre-wrap; font-weight: 400; }

        .loading { text-align: center; padding: 40px; color: #555; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }

        /* REVEAL ANIMATION */
        @keyframes reveal {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .sidebar { animation: reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .header { animation: reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards; opacity: 0; }
        .widget { animation: reveal 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards; opacity: 0; }
    </style>
</head>
<body>

    <div id="sidebar-placeholder"></div>

    <main class="main-content">
        <div class="header">
            <h1>Q<span style="color:var(--highlight)">U</span>ERIES</h1>
            <p>Manage incoming inquiries and messages from the website contact forms.</p>
        </div>
        <style>
            .header { margin-bottom: 48px; }
            .header h1 { font-size: 72px; font-weight: 900; color: #FF2D2D; letter-spacing: -4px; line-height: 0.9; text-transform: uppercase; margin: 0; }
            .header p { font-size: 14px; color: #666; margin-top: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        </style>

        <div class="widget">
            <input type="text" class="search-bar" placeholder="SEARCH QUERIES..." onkeyup="filterTable(this)">
            
            <div id="tableContainer">
                <div class="loading">POLLING INQUIRIES...</div>
            </div>
        </div>
    </main>

    <div id="msgModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modalTopic" class="modal-topic"></div>
            <div id="modalSender" class="modal-sender"></div>
            <div id="modalText" class="modal-text"></div>
        </div>
    </div>

    <script>
        let globalQueries = [];

        async function loadQueries() {
            const container = document.getElementById('tableContainer');
            try {
                const res = await fetch('/api/db-inquiries');
                if (!res.ok) throw new Error();
                const data = await res.json();
                
                let html = `<table class="data-table" id="queryTable">
                    <thead>
                        <tr>
                            <th>SENDER</th>
                            <th>TOPIC & MESSAGE</th>
                            <th>RECEIVED</th>
                        </tr>
                    </thead>
                    <tbody>`;
                
                globalQueries = data;
                data.forEach((q, index) => {
                    html += `<tr onclick="openModal(${index})">
                        <td>
                            <div style="color:#fff;">${q.name}</div>
                            <div style="color:#555; font-size:12px; font-weight:400;">${q.email}</div>
                        </td>
                        <td>
                            <span class="topic">${q.topic}</span>
                            <span class="msg">${q.message}</span>
                        </td>
                        <td style="color:#444; font-size:12px;">${new Date(q.createdAt).toLocaleDateString()}</td>
                    </tr>`;
                });

                html += `</tbody></table>`;
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<div class="loading" style="color:var(--primary)">CONNECTION ERROR: INQUIRY FEED OFFLINE</div>`;
            }
        }

        function filterTable(input) {
            const filter = input.value.toUpperCase();
            const table = document.getElementById("queryTable");
            if (!table) return;
            const tr = table.getElementsByTagName("tr");
            for (let i = 1; i < tr.length; i++) {
                const tdAll = tr[i].textContent || tr[i].innerText;
                tr[i].style.display = tdAll.toUpperCase().indexOf(filter) > -1 ? "" : "none";
            }
        }

        function openModal(index) {
            const q = globalQueries[index];
            if(!q) return;
            document.getElementById('modalTopic').innerText = q.topic;
            document.getElementById('modalSender').innerText = q.name + " (" + q.email + ")";
            document.getElementById('modalText').innerText = q.message;
            document.getElementById('msgModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('msgModal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('msgModal');
            if (event.target == modal) {
                closeModal();
            }
        }

        loadQueries();
    </script>
</body>
</html>
