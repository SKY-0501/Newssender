<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoMail | Subscribers</title>
    <link rel="stylesheet" href="sidebar.css">
    <script src="sidebar.js"></script>
    <script>
        if (localStorage.getItem('blast_studio_auth') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary:     #FF2D2D;
            --bg:          #111111;
            --surface:     #161616;
            --border:      #333333;
            --text:        #FFFFFF;
            --text-sub:    #bbbbbb;
            --accent:      #FF2D2D;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; min-height: 100vh; overflow-x: hidden; }

        /* Film Grain Overlay */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04; pointer-events: none; z-index: 9999;
        }

        /* Local Styles */.header h1 { font-size: 82px; font-weight: 900; color: var(--primary); letter-spacing: -4px; line-height: 0.9; text-transform: uppercase; }
        .header p { font-size: 16px; color: var(--text-sub); margin-top: 12px; max-width: 600px; }

        /* WIDGET / TABLE AREA */
        .widget {
            background: #111;
            border: 1px dashed #333;
            padding: 40px;
            position: relative;
            border-radius: 4px;
        }
        .widget::before, .widget::after {
            content: "○"; position: absolute; font-size: 10px; color: #444;
        }
        .widget::before { top: 10px; left: 10px; }
        .widget::after { top: 10px; right: 10px; }

        .search-bar {
            margin-bottom: 32px;
            background: #161616;
            border: 1.5px solid #222;
            border-radius: 100px;
            padding: 14px 24px;
            width: 100%;
            max-width: 400px;
            color: #fff;
            outline: none;
            font-size: 14px;
        }
        .search-bar:focus { border-color: var(--primary); }

        .data-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .data-table th, .data-table td { padding: 16px; text-align: left; border-bottom: 1px solid #222; }
        .data-table th { 
            font-weight: 900; color: #000; background: #e8e8e4; 
            font-size: 10px; text-transform: uppercase; letter-spacing: 2px;
        }
        .data-table td { color: #fff; font-size: 14px; font-weight: 600; }
        .data-table td .email { color: #888; font-weight: 400; font-size: 13px; }
        
        .status-badge { padding: 4px 12px; border-radius: 100px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .status-verified { background: rgba(0, 255, 127, 0.1); color: #00ff7f; border: 1px solid rgba(0, 255, 127, 0.2); }
        .status-pending { background: rgba(255, 191, 0, 0.1); color: #ffbf00; border: 1px solid rgba(255, 191, 0, 0.2); }

        .loading { text-align: center; padding: 40px; color: #555; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }

        /* REVEAL ANIMATION */
        @keyframes reveal {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .sidebar { animation: reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .header { animation: reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards; opacity: 0; }
        .widget { animation: reveal 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards; opacity: 0; }
    </style>
</head>
<body>

    <div id="sidebar-placeholder"></div>

    <main class="main-content">
        <div class="header">
            <h1>S<span style="color:#e7e7e3">U</span>BSCRIBERS</h1>
            <p>Direct database view of all verified and pending newsletter participants.</p>
        </div>
        <style>
            .header { margin-bottom: 48px; }
            .header h1 { font-size: 72px; font-weight: 900; color: #FF2D2D; letter-spacing: -4px; line-height: 0.9; text-transform: uppercase; margin: 0; }
            .header p { font-size: 14px; color: #666; margin-top: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        </style>

        <div class="widget">
            <input type="text" class="search-bar" placeholder="SEARCH SUBSCRIBERS..." onkeyup="filterTable(this)">
            
            <div id="tableContainer">
                <div class="loading">SYNCING DATABASE...</div>
            </div>
        </div>
    </main>

    <script>
        async function loadSubscribers() {
            const container = document.getElementById('tableContainer');
            try {
                const res = await fetch('/api/db-subscribers');
                if (!res.ok) throw new Error();
                const data = await res.json();
                
                let html = `<table class="data-table" id="subTable">
                    <thead>
                        <tr>
                            <th>NAME</th>
                            <th>EMAIL</th>
                            <th>STATUS</th>
                            <th>JOINED</th>
                        </tr>
                    </thead>
                    <tbody>`;
                
                data.forEach(sub => {
                    const statusText = sub.isVerified ? 'Verified' : 'Pending';
                    const statusClass = sub.isVerified ? 'status-verified' : 'status-pending';
                    html += `<tr>
                        <td>${sub.name}</td>
                        <td class="email">${sub.email}</td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td style="color:#444; font-size:12px;">${new Date(sub.createdAt).toLocaleDateString()}</td>
                    </tr>`;
                });

                html += `</tbody></table>`;
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<div class="loading" style="color:var(--primary)">CONNECTION ERROR: DATABASE OFFLINE</div>`;
            }
        }

        function filterTable(input) {
            const filter = input.value.toUpperCase();
            const table = document.getElementById("subTable");
            if (!table) return;
            const tr = table.getElementsByTagName("tr");
            for (let i = 1; i < tr.length; i++) {
                const tdName = tr[i].getElementsByTagName("td")[0];
                const tdEmail = tr[i].getElementsByTagName("td")[1];
                if (tdName || tdEmail) {
                    const txtValue = (tdName.textContent || tdName.innerText) + (tdEmail.textContent || tdEmail.innerText);
                    tr[i].style.display = txtValue.toUpperCase().indexOf(filter) > -1 ? "" : "none";
                }
            }
        }

        loadSubscribers();
    </script>
</body>
</html>
