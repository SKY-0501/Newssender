name: Build and Deploy to ACA

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: orcnewsletter.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        run: |
          docker build -t orcnewsletter.azurecr.io/newsletter-sender:${{ github.sha }} .
          docker push orcnewsletter.azurecr.io/newsletter-sender:${{ github.sha }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          imageToDeploy: orcnewsletter.azurecr.io/newsletter-sender:${{ github.sha }}
          containerAppName: orchvate-newsletter
          resourceGroup: website_newsletter
